<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Hasbiyah</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2E7D32; --primary-dark: #1B5E20; --secondary: #E8F5E9;
            --background: #F4F7F6; --card-bg: #FFFFFF; --text: #333333; 
            --text-light: #757575; --border: #E0E0E0; --input-bg: #FFFFFF;
            --danger: #D32F2F; --success: #388E3C; --shadow: 0 4px 15px rgba(0,0,0,0.05); 
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --background: #121212; --card-bg: #1E1E1E; --text: #E0E0E0; 
            --text-light: #B0B0B0; --border: #333333; --input-bg: #2C2C2C;
            --secondary: #1B5E20; --success: #4ADE80; --danger: #F87171; --primary: #86EFAC;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--background); color: var(--text); padding: 20px; transition: background 0.3s ease; }
        .container { max-width: 1400px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 25px; }
        h1.brand-title { color: var(--primary); font-weight: 800; font-size: 28px; }
        .theme-toggle { background: var(--secondary); color: var(--primary); padding: 8px 18px; border-radius: 25px; cursor: pointer; border: 2px solid var(--primary); font-weight: bold; }

        .tab-system { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 24px; border-radius: 12px 12px 0 0; border: none; cursor: pointer; font-weight: 700; background: var(--border); color: var(--text-light); }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 22px; border-radius: 15px; box-shadow: var(--shadow); border-left: 6px solid #ccc; transition: var(--transition); }
        .stat-kotor { border-left-color: #2E7D32; } .stat-kotor:hover { background: rgba(46, 125, 50, 0.08); transform: translateY(-3px); }
        .stat-keluar { border-left-color: #D32F2F; } .stat-keluar:hover { background: rgba(211, 47, 47, 0.08); transform: translateY(-3px); }
        .stat-gaji { border-left-color: #FBC02D; } .stat-gaji:hover { background: rgba(251, 192, 45, 0.08); transform: translateY(-3px); }
        .stat-bersih { border-left-color: #1B5E20; } .stat-bersih:hover { background: rgba(27, 94, 32, 0.08); transform: translateY(-3px); }
        .stat-pasien { border-left-color: #9C27B0; } .stat-pasien:hover { background: rgba(156, 39, 176, 0.08); transform: translateY(-3px); }

        .stat-label { font-size: 11px; color: var(--text-light); font-weight: 700; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: 800; margin-top: 10px; display: block; }
        .masuk { color: var(--success); }
        .keluar { color: var(--danger); }

        .main-layout { display: grid; grid-template-columns: 320px 1fr; gap: 25px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border); }
        h4.card-title { color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid var(--secondary); padding-bottom: 8px; font-weight: 800; }
        
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px; background: var(--input-bg); color: var(--text); }
        button { padding: 12px 15px; cursor: pointer; border: none; border-radius: 10px; font-weight: 700; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-excel { background: #1B5E20; color: white; font-size: 12px; }
        .btn-pdf { background: #B71C1C; color: white; font-size: 12px; }
        
        .manager-list { max-height: 120px; overflow-y: auto; margin-bottom: 15px; border: 1px solid var(--border); padding: 8px; border-radius: 10px; }
        .list-item { display: inline-flex; align-items: center; background: var(--background); padding: 5px 12px; border-radius: 20px; margin: 3px; font-size: 11px; font-weight: 600; }

        .table-container { background: var(--card-bg); border-radius: 15px; box-shadow: var(--shadow); padding: 15px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; background: var(--background); font-size: 11px; color: var(--text-light); text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); text-align: center; font-size: 13px; }
        .hidden { display: none !important; }
    </style>
</head>

<body data-theme="light">
<div class="container">
    <header>
        <h1 class="brand-title">Peta Hasbiyah 📊</h1>
        <button class="theme-toggle" id="themeSwitcher" onclick="toggleTheme()">🌙 MODE GELAP</button>
    </header>

    <div class="tab-system">
        <button class="tab-btn active" onclick="openTab('tab-utama')">Dashboard Utama</button>
        <button class="tab-btn" onclick="openTab('tab-terapis')">Laporan Terapis</button>
    </div>

    <div id="tab-utama" class="tab-content active">
        <div class="dashboard-grid">
            <div class="stat-card stat-kotor"><div class="stat-label">Total Kotor</div><div id="quickKotor" class="stat-value masuk">Rp 0</div></div>
            <div class="stat-card stat-keluar"><div class="stat-label">Total Keluar</div><div id="quickKeluar" class="stat-value keluar">Rp 0</div></div>
            <div class="stat-card stat-gaji"><div class="stat-label">Gaji Terapis</div><div id="quickGaji" class="stat-value" style="color: #FBC02D;">Rp 0</div></div>
            <div class="stat-card stat-bersih"><div class="stat-label">Dana Bersih</div><div id="quickBersih" class="stat-value" style="color: var(--primary);">Rp 0</div></div>
        </div>

        <div class="main-layout">
            <aside>
                <div class="card">
                    <h4 class="card-title">⚙️ Master Data</h4>
                    <div style="display:flex; gap:5px;"><input type="text" id="usahaBaru" placeholder="Usaha..."><button onclick="tambahUsaha()">+</button></div>
                    <div id="daftarUsahaContainer" class="manager-list"></div>
                    <div style="display:flex; gap:5px;"><input type="text" id="terapisBaru" placeholder="Terapis..."><button onclick="tambahTerapis()">+</button></div>
                    <div id="listTerapisContainer" class="manager-list"></div>
                </div>
                <div class="card">
                    <h4 class="card-title">✍️ Input Transaksi</h4>
                    <input type="date" id="tanggal">
                    <select id="usaha" onchange="toggleTerapisUI()"></select>
                    <select id="jenis"><option value="masuk">Pemasukan (+)</option><option value="keluar">Pengeluaran (-)</option></select>
                    <select id="inputTerapis" class="hidden"></select>
                    <input type="number" id="jumlah" placeholder="Nominal Rp">
                    <input type="text" id="deskripsi" placeholder="Keterangan">
                    <button onclick="tambahData()" class="btn-primary">💾 SIMPAN DATA</button>
                </div>
            </aside>
            <main>
                <div class="card" style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
                    <div style="flex:1.5;"><label>Usaha</label><select id="filterUsaha" onchange="renderData()"></select></div>
                    <div style="flex:1;"><label>Mulai</label><input type="date" id="filterMulai" onchange="renderData()"></div>
                    <div style="flex:1;"><label>Selesai</label><input type="date" id="filterSelesai" onchange="renderData()"></div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="exportExcelMain()" class="btn-excel">📗 EXCEL</button>
                        <button onclick="exportPDFGeneric('utama')" class="btn-pdf">📕 PDF</button>
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Tgl</th><th>Usaha</th><th>Jenis</th><th>Terapis</th><th>Nominal</th><th>Ket</th><th>Hapus</th></tr></thead>
                        <tbody id="tabelData"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div id="tab-terapis" class="tab-content">
        <div class="card" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap:10px; align-items:flex-end;">
            <div><label>Terapis</label><select id="filterKhususTerapis" onchange="renderTerapisPage()"></select></div>
            <div><label>Mulai</label><input type="date" id="tglMulaiTerapis" onchange="renderTerapisPage()"></div>
            <div><label>Selesai</label><input type="date" id="tglSelesaiTerapis" onchange="renderTerapisPage()"></div>
            <div style="display:flex; gap:5px;">
                <button onclick="exportExcelTerapis()" class="btn-excel">📗 Excel</button>
                <button onclick="exportPDFGeneric('terapis')" class="btn-pdf">📕 PDF</button>
            </div>
        </div>
        <div class="dashboard-grid">
            <div class="stat-card stat-kotor"><div class="stat-label">Omzet Jasa</div><div id="omzetTerapis" class="stat-value masuk">Rp 0</div></div>
            <div class="stat-card stat-gaji"><div class="stat-label">Bagi Hasil</div><div id="gajiTerapis" class="stat-value" style="color: #FBC02D;">Rp 0</div></div>
            <div class="stat-card stat-bersih"><div class="stat-label">Net Peta</div><div id="bersihTerapisPage" class="stat-value" style="color: var(--primary);">Rp 0</div></div>
            <div class="stat-card stat-pasien"><div class="stat-label">Jumlah Pasien</div><div id="pasienTerapis" class="stat-value">0</div></div>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>Tgl</th><th>Usaha</th><th>Terapis</th><th>Omzet</th><th>Gaji</th><th>Ket</th></tr></thead>
                <tbody id="tabelTerapis"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let cacheData = JSON.parse(localStorage.getItem("cacheData_v2") || "[]");
    let daftarUsaha = JSON.parse(localStorage.getItem("daftarUsaha") || '["Pijat","Bekam","Gurah"]');
    let daftarTerapis = JSON.parse(localStorage.getItem("daftarTerapis") || '[]');

    const formatRupiah = (n) => new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(n||0);
    const formatTglIndo = (dateStr) => { 
        if(!dateStr || dateStr === "-") return "-"; 
        const [y, m, d] = dateStr.split('-'); return `${d}/${m}/${y}`;
    };

    function toggleTheme() {
        const b = document.body;
        const nt = b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        b.setAttribute('data-theme', nt);
        localStorage.setItem('theme', nt);
        document.getElementById('themeSwitcher').innerHTML = nt === 'dark' ? "☀️ TERANG" : "🌙 GELAP";
    }

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('tanggal').value = today;
    document.querySelectorAll('[id^="filterMulai"], [id^="tglMulai"]').forEach(i => i.value = today.substring(0,8) + '01');
    document.querySelectorAll('[id^="filterSelesai"], [id^="tglSelesai"]').forEach(i => i.value = today);

    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'tab-terapis') renderTerapisPage();
    }

    function renderTerapisUI() {
        const s = document.getElementById('inputTerapis'), f = document.getElementById('filterKhususTerapis'), c = document.getElementById('listTerapisContainer');
        s.innerHTML = '<option value="">-- Pilih Terapis --</option>'; f.innerHTML = '<option value="Semua">Semua Terapis</option>';
        daftarTerapis.sort().forEach(t => { const o = `<option value="${t}">${t}</option>`; s.innerHTML += o; f.innerHTML += o; });
        c.innerHTML = ''; daftarTerapis.forEach((t, i) => { c.innerHTML += `<div class="list-item">${t} <span onclick="hapusMaster('terapis', ${i})" style="color:red;cursor:pointer;margin-left:5px;">&times;</span></div>`; });
    }

    function renderUsahaUI() {
        const s = document.getElementById('usaha'), f = document.getElementById('filterUsaha'), c = document.getElementById('daftarUsahaContainer');
        s.innerHTML = ''; f.innerHTML = '<option value="Semua">Semua Usaha</option>';
        c.innerHTML = ''; daftarUsaha.forEach((u, i) => {
            s.innerHTML += `<option value="${u}">${u}</option>`; f.innerHTML += `<option value="${u}">${u}</option>`;
            c.innerHTML += `<div class="list-item">${u} <span onclick="hapusMaster('usaha', ${i})" style="color:red;cursor:pointer;margin-left:5px;">&times;</span></div>`;
        });
        toggleTerapisUI();
    }

    function tambahTerapis() { let n = document.getElementById('terapisBaru').value.trim(); if(n && !daftarTerapis.includes(n)) { daftarTerapis.push(n); localStorage.setItem("daftarTerapis", JSON.stringify(daftarTerapis)); renderTerapisUI(); } document.getElementById('terapisBaru').value = ""; }
    function tambahUsaha() { let u = document.getElementById('usahaBaru').value.trim(); if(u && !daftarUsaha.includes(u)) { daftarUsaha.push(u); localStorage.setItem("daftarUsaha", JSON.stringify(daftarUsaha)); renderUsahaUI(); } document.getElementById('usahaBaru').value = ""; }
    function hapusMaster(t, i) { if(confirm("Hapus?")) { if(t==='usaha') daftarUsaha.splice(i,1); else daftarTerapis.splice(i,1); localStorage.setItem(t==='usaha'?"daftarUsaha":"daftarTerapis", JSON.stringify(t==='usaha'?daftarUsaha:daftarTerapis)); t==='usaha'?renderUsahaUI():renderTerapisUI(); } }
    function toggleTerapisUI() { const u = document.getElementById('usaha').value.toLowerCase(); const isS = u.includes("pijat")||u.includes("bekam")||u.includes("gurah"); document.getElementById('inputTerapis').classList.toggle('hidden', !isS); }

    function tambahData() {
        const u = document.getElementById('usaha').value, tgl = document.getElementById('tanggal').value, j = document.getElementById('jenis').value, jml = parseInt(document.getElementById('jumlah').value), trp = document.getElementById('inputTerapis').value, dsk = document.getElementById('deskripsi').value;
        if(!tgl || !jml) return alert("Wajib diisi!");
        const isS = u.toLowerCase().includes("pijat")||u.toLowerCase().includes("bekam")||u.toLowerCase().includes("gurah");
        cacheData.push({ tanggal: tgl, usaha: u, jenis: j, jumlah: jml, terapis: (isS ? (trp || "Tanpa Nama") : "-"), deskripsi: dsk || "-" });
        localStorage.setItem("cacheData_v2", JSON.stringify(cacheData)); renderData();
    }

    function renderData() {
        const fU = document.getElementById('filterUsaha').value, fM = document.getElementById('filterMulai').value, fS = document.getElementById('filterSelesai').value;
        const data = cacheData.filter(d => (fU === "Semua" || d.usaha === fU) && (d.tanggal >= fM && d.tanggal <= fS)).sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));
        const tb = document.getElementById('tabelData'); tb.innerHTML = "";
        let k=0, l=0, p=0, g=0;
        data.forEach(d => {
            if(d.jenis === 'masuk') { k+=d.jumlah; let gj = (d.terapis !== "-" && d.terapis !== "Tanpa Nama") ? (d.jumlah <= 50000 ? d.jumlah : d.jumlah * 0.65) : 0; g+=gj; p+=(d.jumlah-gj); } else { l+=d.jumlah; }
            tb.innerHTML += `<tr><td>${formatTglIndo(d.tanggal)}</td><td>${d.usaha}</td><td class="${d.jenis}">${d.jenis.toUpperCase()}</td><td>${d.terapis}</td><td>${formatRupiah(d.jumlah)}</td><td>${d.deskripsi}</td><td><button onclick="hapus(${cacheData.indexOf(d)})" style="color:red;background:none;border:none;cursor:pointer;font-size:16px;">&times;</button></td></tr>`;
        });
        document.getElementById('quickKotor').textContent = formatRupiah(k); document.getElementById('quickKeluar').textContent = formatRupiah(l); document.getElementById('quickGaji').textContent = formatRupiah(g); document.getElementById('quickBersih').textContent = formatRupiah(p-l);
    }

    function renderTerapisPage() {
        const terp = document.getElementById('filterKhususTerapis').value;
        const fM = document.getElementById('tglMulaiTerapis').value, fS = document.getElementById('tglSelesaiTerapis').value;
        const data = cacheData.filter(d => d.jenis === 'masuk' && d.terapis !== "-" && (terp === "Semua" || d.terapis === terp) && (d.tanggal >= fM && d.tanggal <= fS)).sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));
        const tb = document.getElementById('tabelTerapis'); tb.innerHTML = "";
        let o=0, g=0, b=0;
        data.forEach(d => {
            let gj = (d.jumlah <= 50000) ? d.jumlah : (d.jumlah * 0.65); o+=d.jumlah; g+=gj; b+=(d.jumlah-gj);
            tb.innerHTML += `<tr><td>${formatTglIndo(d.tanggal)}</td><td>${d.usaha}</td><td>${d.terapis}</td><td class="masuk">${formatRupiah(d.jumlah)}</td><td style="color:#FBC02D; font-weight:bold;">${formatRupiah(gj)}</td><td>${d.deskripsi}</td></tr>`;
        });
        document.getElementById('omzetTerapis').textContent = formatRupiah(o); document.getElementById('gajiTerapis').textContent = formatRupiah(g); document.getElementById('bersihTerapisPage').textContent = formatRupiah(b);
        document.getElementById('pasienTerapis').textContent = data.length;
    }

    function exportPDFGeneric(mode) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        let title = mode === 'utama' ? "LAPORAN KEUANGAN PETA HASBIYAH" : "LAPORAN KOMISI TERAPIS";
        let fM = mode === 'utama' ? document.getElementById('filterMulai').value : document.getElementById('tglMulaiTerapis').value;
        let fS = mode === 'utama' ? document.getElementById('filterSelesai').value : document.getElementById('tglSelesaiTerapis').value;
        let unit = mode === 'utama' ? document.getElementById('filterUsaha').value : document.getElementById('filterKhususTerapis').value;

        doc.setFillColor(46, 125, 50); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(20); doc.setFont("helvetica", "bold"); doc.text(title, 15, 18);
        doc.setFontSize(10); doc.setFont("helvetica", "normal");
        doc.text(`Periode: ${formatTglIndo(fM)} s/d ${formatTglIndo(fS)}`, 15, 26);
        doc.text(`${mode === 'utama'?'Unit':'Terapis'}: ${unit}`, 15, 32);

        let k=0, l=0, g=0, gt={};
        let filtered = cacheData.filter(d => {
            let dm = d.tanggal >= fM && d.tanggal <= fS;
            if(mode === 'utama') return dm && (unit === "Semua" || d.usaha === unit);
            return dm && d.jenis === 'masuk' && d.terapis !== "-" && (unit === "Semua" || d.terapis === unit);
        }).sort((a,b) => new Date(a.tanggal) - new Date(b.tanggal));

        let rows = filtered.map(d => {
            let gj = 0;
            if(d.jenis === 'masuk') { k+=d.jumlah; gj = (d.terapis !== "-" && d.terapis !== "Tanpa Nama") ? (d.jumlah <= 50000 ? d.jumlah : d.jumlah * 0.65) : 0; g+=gj; if(gj>0) gt[d.terapis] = (gt[d.terapis]||0)+gj; } else { l+=d.jumlah; }
            return mode === 'utama' ? [formatTglIndo(d.tanggal), d.usaha, d.jenis.toUpperCase(), d.terapis, formatRupiah(d.jumlah), d.deskripsi] : [formatTglIndo(d.tanggal), d.usaha, d.terapis, formatRupiah(d.jumlah), formatRupiah(gj), d.deskripsi];
        });

        doc.autoTable({
            head: mode === 'utama' ? [['Tgl', 'Usaha', 'Jenis', 'Terapis', 'Nominal', 'Ket']] : [['Tgl', 'Usaha', 'Nama', 'Omzet', 'Gaji', 'Ket']],
            body: rows, startY: 45, theme: 'grid', styles: { fontSize: 8 },
            headStyles: { fillColor: [38, 166, 154], textColor: 255, halign: 'center' },
            didParseCell: (data) => { if(data.section === 'body' && (data.cell.raw === 'KELUAR')) data.cell.styles.textColor = [211, 47, 47]; if(data.section === 'body' && (data.cell.raw === 'MASUK')) data.cell.styles.textColor = [56, 142, 60]; }
        });

        let fy = doc.lastAutoTable.finalY + 10;
        doc.setDrawColor(46, 125, 50); doc.rect(15, fy, 180, 60);
        doc.setTextColor(46, 125, 50); doc.setFont("helvetica", "bold"); doc.text("RINGKASAN REKAPITULASI", 20, fy + 10);
        doc.setTextColor(0); doc.setFont("helvetica", "normal");
        doc.text(`Total Pendapatan Kotor : ${formatRupiah(k)}`, 20, fy + 22);
        doc.text(`Total Pengeluaran       : ${formatRupiah(l)}`, 20, fy + 30);
        doc.text(`Total Gaji Terapis        : ${formatRupiah(g)}`, 20, fy + 38);
        doc.line(100, fy + 5, 100, fy + 45);
        doc.setFont("helvetica", "bold"); doc.text("DETAIL DISTRIBUSI GAJI:", 105, fy + 10);
        doc.setFont("helvetica", "normal");
        let rg = fy + 18; for (let t in gt) { if(rg < fy + 48) { doc.text(`- ${t}`, 105, rg); doc.text(formatRupiah(gt[t]), 185, rg, {align:'right'}); rg += 6; } }
        doc.setFillColor(46, 125, 50); doc.rect(15, fy + 50, 180, 10, 'F');
        doc.setTextColor(255); doc.setFont("helvetica", "bold"); doc.text(`TOTAL DANA BERSIH PETA: ${formatRupiah(k - g - l)}`, 105, fy + 56.5, {align:'center'});
        doc.save(`${title}.pdf`);
    }

    function exportExcelMain() { const ws = XLSX.utils.json_to_sheet(cacheData); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, "Rekap_Keuangan.xlsx"); }
    function exportExcelTerapis() { const data = cacheData.filter(d => d.terapis !== "-"); const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Terapis"); XLSX.writeFile(wb, "Rekap_Terapis.xlsx"); }
    function hapus(i) { if(confirm("Hapus?")) { cacheData.splice(i,1); localStorage.setItem("cacheData_v2", JSON.stringify(cacheData)); renderData(); } }

    renderUsahaUI(); renderTerapisUI(); renderData();
</script>
