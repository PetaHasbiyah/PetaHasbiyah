<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Hasbiyah - Dashboard Keuangan</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
    :root {
        --primary: #2E7D32; --primary-dark: #1B5E20; --secondary: #E8F5E9;
        --background: #F4F7F6; --card-bg: #FFFFFF; --text: #333333; 
        --text-light: #757575; --border: #E0E0E0; --input-bg: #FFFFFF;
        --danger: #D32F2F; --success: #388E3C; --shadow: 0 4px 15px rgba(0,0,0,0.05); 
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
        --background: #121212; --card-bg: #1E1E1E; --text: #E0E0E0; 
        --text-light: #B0B0B0; --border: #333333; --input-bg: #2C2C2C;
        --secondary: #1B5E20; --success: #4ADE80; --danger: #F87171; --primary: #86EFAC;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background-color: var(--background); color: var(--text); padding: 20px; transition: background 0.3s ease; }
    .container { max-width: 1400px; margin: auto; }
    
    header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 25px; }
    h1.brand-title { color: var(--primary); font-weight: 800; font-size: 28px; }
    
    .theme-toggle { background: var(--secondary); color: var(--primary); padding: 8px 18px; border-radius: 25px; cursor: pointer; border: 2px solid var(--primary); font-weight: bold; transition: var(--transition); }
    .theme-toggle:hover { background: var(--primary); color: white; transform: scale(1.05); }

    .tab-system { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { padding: 12px 24px; border-radius: 12px 12px 0 0; border: none; cursor: pointer; font-weight: 700; background: var(--border); color: var(--text-light); transition: var(--transition); }
    .tab-btn.active { background: var(--primary); color: white; transform: translateY(-2px); box-shadow: 0 -4px 10px rgba(46, 125, 50, 0.2); }

    .tab-content { display: none; opacity: 0; transform: translateY(10px); }
    .tab-content.active { display: block; animation: fadeInUp 0.4s forwards; }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }

    /* ================= HOVER WARNA (UTAMA) ================= */

    .stat-card { 
    background: var(--card-bg);
    padding: 22px; 
    border-radius: 15px; 
    box-shadow: var(--shadow); 
    transition: all 0.3s ease;
    cursor: pointer;

    /* GARIS SAMPING */
    border-left: 6px solid transparent;
}

/* WARNA MASING-MASING CARD */
.stat-kotor {
    border-left: 6px solid #2E7D32;
}

.stat-keluar {
    border-left: 6px solid #D32F2F;
}

.stat-gaji {
    border-left: 6px solid #FBC02D;
}

.stat-bersih {
    border-left: 6px solid #1B5E20;
}

.stat-pasien {
    border-left: 6px solid #9C27B0;
}

/* BONUS HOVER BIAR HIDUP */
.stat-card:hover {
    transform: translateY(-3px);
}

    /* === HOVER WARNA SAMAR (LEBIH SOFT) === */

.stat-kotor:hover {
    background: rgba(46,125,50,0.12);
}

.stat-keluar:hover {
    background: rgba(211,47,47,0.12);
}

.stat-gaji:hover {
    background: rgba(251,192,45,0.18);
}

.stat-bersih:hover {
    background: rgba(27,94,32,0.12);
}

.stat-pasien:hover {
    background: rgba(156,39,176,0.12);
}

    /* efek naik halus */
    .stat-card:hover { 
        transform: translateY(-5px) scale(1.02); 
        box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
    }

    /* ====================================================== */

    .stat-label { font-size: 11px; color: var(--text-light); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 24px; font-weight: 800; margin-top: 10px; display: block; }
    
    .main-layout { display: grid; grid-template-columns: 320px 1fr; gap: 25px; }
    .card { background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border); transition: var(--transition); }
    h4.card-title { color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid var(--secondary); padding-bottom: 8px; font-weight: 800; }
    
    input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px; background: var(--input-bg); color: var(--text); transition: var(--transition); }
    input:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px var(--secondary); }
    
    button { padding: 12px 15px; cursor: pointer; border: none; border-radius: 10px; font-weight: 700; transition: var(--transition); }
    button:active { transform: scale(0.95); }
    
    .btn-primary { background: var(--primary); color: white; width: 100%; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-excel { background: #1B5E20; color: white; font-size: 12px; }
    .btn-pdf { background: #B71C1C; color: white; font-size: 12px; }

    .manager-list { max-height: 140px; overflow-y: auto; margin-bottom: 15px; border: 1px solid var(--border); padding: 10px; border-radius: 10px; background: var(--input-bg); }
    .list-item { 
        display: inline-flex; align-items: center; 
        background: #2E7D32 !important; color: white !important;
        padding: 6px 14px; border-radius: 20px; margin: 4px; 
        font-size: 12px; font-weight: 600; 
        animation: popIn 0.3s ease; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

    .table-container { background: var(--card-bg); border-radius: 15px; box-shadow: var(--shadow); padding: 15px; overflow-x: auto; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 15px; background: var(--background); font-size: 11px; color: var(--text-light); text-transform: uppercase; border-bottom: 2px solid var(--border); }
    td { padding: 12px; border-bottom: 1px solid var(--border); text-align: center; font-size: 13px; transition: background 0.2s; }
    tr:hover td { background: rgba(0,0,0,0.02); }
    
    .masuk { color: var(--success); font-weight: 700; }
    .keluar { color: var(--danger); font-weight: 700; }
    .hidden { display: none !important; }
</style>
</head>

<body data-theme="light">
<div class="container">
    <header>
        <h1 class="brand-title">Peta Hasbiyah 📊</h1>
        <button class="theme-toggle" id="themeSwitcher" onclick="toggleTheme()">🌙 MODE GELAP</button>
    </header>

    <div class="tab-system">
        <button class="tab-btn active" onclick="openTab('tab-utama')">Dashboard Utama</button>
        <button class="tab-btn" onclick="openTab('tab-terapis')">Laporan Terapis</button>
    </div>

    <div id="tab-utama" class="tab-content active">
        <div class="dashboard-grid">
            <div class="stat-card stat-kotor"><div class="stat-label">Total Kotor</div><div id="quickKotor" class="stat-value masuk">Rp 0</div></div>
            <div class="stat-card stat-keluar"><div class="stat-label">Total Keluar</div><div id="quickKeluar" class="stat-value keluar">Rp 0</div></div>
            <div class="stat-card stat-gaji"><div class="stat-label">Gaji Terapis</div><div id="quickGaji" class="stat-value" style="color: #FBC02D;">Rp 0</div></div>
            <div class="stat-card stat-bersih"><div class="stat-label">Dana Bersih</div><div id="quickBersih" class="stat-value" style="color: var(--primary);">Rp 0</div></div>
        </div>

        <div class="main-layout">
            <aside>
                <div class="card">
                    <h4 class="card-title">⚙️ Master Data</h4>
                    <div style="display:flex; gap:5px;"><input type="text" id="usahaBaru" placeholder="Usaha..."><button onclick="tambahUsaha()">+</button></div>
                    <div id="daftarUsahaContainer" class="manager-list"></div>
                    <div style="display:flex; gap:5px;"><input type="text" id="terapisBaru" placeholder="Terapis..."><button onclick="tambahTerapis()">+</button></div>
                    <div id="listTerapisContainer" class="manager-list"></div>
                </div>
                <div class="card">
                    <h4 class="card-title">✍️ Input Transaksi</h4>
                    <input type="date" id="tanggal">
                    <select id="usaha" onchange="toggleTerapisUI()"></select>
                    <select id="jenis"><option value="masuk">Pemasukan (+)</option><option value="keluar">Pengeluaran (-)</option></select>
                    <select id="inputTerapis" class="hidden"></select>
                    <input type="number" id="jumlah" placeholder="Nominal Rp">
                    <input type="text" id="deskripsi" placeholder="Keterangan">
<input type="number" id="jumlahPasien" placeholder="Jumlah Pasien" min="1" value="1">
                    <button onclick="tambahData()" class="btn-primary">💾 SIMPAN DATA</button>
                </div>
            </aside>
            <main>
                <div class="card" style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
                    <div style="flex:1.5;"><label>Usaha</label><select id="filterUsaha" onchange="renderData()"></select></div>
                    <div style="flex:1;"><label>Mulai</label><input type="date" id="filterMulai" onchange="renderData()"></div>
                    <div style="flex:1;"><label>Selesai</label><input type="date" id="filterSelesai" onchange="renderData()"></div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="exportExcelMain()" class="btn-excel">📗 EXCEL</button>
                        <button onclick="exportPDFGeneric('utama')" class="btn-pdf">📕 PDF</button>
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Tgl</th><th>Usaha</th><th>Jenis</th><th>Terapis</th><th>Nominal</th><th>Ket</th><th>Hapus</th></tr></thead>
                        <tbody id="tabelData"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div id="tab-terapis" class="tab-content">
        <div class="card" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap:10px; align-items:flex-end;">
            <div><label>Terapis</label><select id="filterKhususTerapis" onchange="renderTerapisPage()"></select></div>
            <div><label>Mulai</label><input type="date" id="tglMulaiTerapis" onchange="renderTerapisPage()"></div>
            <div><label>Selesai</label><input type="date" id="tglSelesaiTerapis" onchange="renderTerapisPage()"></div>
            <div style="display:flex; gap:5px;">
                <button onclick="exportExcelTerapis()" class="btn-excel">📗 Excel</button>
                <button onclick="exportPDFGeneric('terapis')" class="btn-pdf">📕 PDF</button>
            </div>
        </div>
        <div class="dashboard-grid">
            <div class="stat-card stat-kotor"><div class="stat-label">Omzet Jasa</div><div id="omzetTerapis" class="stat-value masuk">Rp 0</div></div>
            <div class="stat-card stat-gaji"><div class="stat-label">Bagi Hasil</div><div id="gajiTerapis" class="stat-value" style="color: #FBC02D;">Rp 0</div></div>
            <div class="stat-card stat-bersih"><div class="stat-label">Net Peta</div><div id="bersihTerapisPage" class="stat-value" style="color: var(--primary);">Rp 0</div></div>
            <div class="stat-card stat-pasien"><div class="stat-label">Jumlah Pasien</div><div id="pasienTerapis" class="stat-value" style="color: #9C27B0;">0</div></div>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>Tgl</th><th>Usaha</th><th>Terapis</th><th>Omzet</th><th>Gaji</th><th>Ket</th></tr></thead>
                <tbody id="tabelTerapis"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let cacheData = JSON.parse(localStorage.getItem("cacheData_v2") || "[]");
    let daftarUsaha = JSON.parse(localStorage.getItem("daftarUsaha") || '["Pijat","Bekam","Gurah"]');
    let daftarTerapis = JSON.parse(localStorage.getItem("daftarTerapis") || '[]');

    const formatRupiah = (n) => new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(n||0);
    const formatTglIndo = (dateStr) => { 
        if(!dateStr || dateStr === "-") return "-"; 
        const [y, m, d] = dateStr.split('-'); return `${d}/${m}/${y}`;
    };

    function toggleTheme() {
        const b = document.body;
        const nt = b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        b.setAttribute('data-theme', nt);
        localStorage.setItem('theme', nt);
        document.getElementById('themeSwitcher').innerHTML = nt === 'dark' ? "☀️ TERANG" : "🌙 GELAP";
    }

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('tanggal').value = today;
    document.querySelectorAll('[id^="filterMulai"], [id^="tglMulai"]').forEach(i => i.value = today.substring(0,8) + '01');
    document.querySelectorAll('[id^="filterSelesai"], [id^="tglSelesai"]').forEach(i => i.value = today);

    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'tab-terapis') renderTerapisPage();
    }

function ambilJumlahPasien(deskripsi) {
    if (!deskripsi || deskripsi === "-") return 1;

    // ambil angka dari teks (contoh: "3 orang" => 3)
    let match = deskripsi.toString().match(/\d+/);
    return match ? parseInt(match[0]) : 1;
}

    function renderTerapisUI() {
        const s = document.getElementById('inputTerapis'), f = document.getElementById('filterKhususTerapis'), c = document.getElementById('listTerapisContainer');
        s.innerHTML = '<option value="">-- Pilih Terapis --</option>'; f.innerHTML = '<option value="Semua">Semua Terapis</option>';
        daftarTerapis.sort().forEach(t => { const o = `<option value="${t}">${t}</option>`; s.innerHTML += o; f.innerHTML += o; });
        c.innerHTML = ''; daftarTerapis.forEach((t, i) => { c.innerHTML += `<div class="list-item">${t} <span onclick="hapusMaster('terapis', ${i})" style="color:white;cursor:pointer;margin-left:10px;font-weight:bold;opacity:0.7;">&times;</span></div>`; });
    }

    function renderUsahaUI() {
        const s = document.getElementById('usaha'), f = document.getElementById('filterUsaha'), c = document.getElementById('daftarUsahaContainer');
        s.innerHTML = ''; f.innerHTML = '<option value="Semua">Semua Usaha</option>';
        c.innerHTML = ''; daftarUsaha.forEach((u, i) => {
            s.innerHTML += `<option value="${u}">${u}</option>`; f.innerHTML += `<option value="${u}">${u}</option>`;
            c.innerHTML += `<div class="list-item">${u} <span onclick="hapusMaster('usaha', ${i})" style="color:white;cursor:pointer;margin-left:10px;font-weight:bold;opacity:0.7;">&times;</span></div>`;
        });
        toggleTerapisUI();
    }

    function tambahTerapis() { let n = document.getElementById('terapisBaru').value.trim(); if(n && !daftarTerapis.includes(n)) { daftarTerapis.push(n); localStorage.setItem("daftarTerapis", JSON.stringify(daftarTerapis)); renderTerapisUI(); } document.getElementById('terapisBaru').value = ""; }
    function tambahUsaha() { let u = document.getElementById('usahaBaru').value.trim(); if(u && !daftarUsaha.includes(u)) { daftarUsaha.push(u); localStorage.setItem("daftarUsaha", JSON.stringify(daftarUsaha)); renderUsahaUI(); } document.getElementById('usahaBaru').value = ""; }
    function hapusMaster(t, i) { if(confirm("Hapus?")) { if(t==='usaha') daftarUsaha.splice(i,1); else daftarTerapis.splice(i,1); localStorage.setItem(t==='usaha'?"daftarUsaha":"daftarTerapis", JSON.stringify(t==='usaha'?daftarUsaha:daftarTerapis)); t==='usaha'?renderUsahaUI():renderTerapisUI(); } }
    function toggleTerapisUI() { const u = document.getElementById('usaha').value.toLowerCase(); const isS = u.includes("pijat")||u.includes("bekam")||u.includes("gurah"); document.getElementById('inputTerapis').classList.toggle('hidden', !isS); }

    function tambahData() {
        const u = document.getElementById('usaha').value,
              tgl = document.getElementById('tanggal').value,
              j = document.getElementById('jenis').value,
              jml = document.getElementById('jumlah').value, // ambil sebagai string dulu
              trp = document.getElementById('inputTerapis').value,
              dsk = document.getElementById('deskripsi').value,
              pasien = document.getElementById('jumlahPasien').value || 1;

        if(!tgl || !jml) return alert("Wajib diisi!");

        const isS = u.toLowerCase().includes("pijat")||u.toLowerCase().includes("bekam")||u.toLowerCase().includes("gurah");
        
        cacheData.push({
            tanggal: tgl, 
            usaha: u, 
            jenis: j, 
            jumlah: parseInt(jml),
            terapis: (isS ? (trp || "Tanpa Nama") : "-"),
            deskripsi: dsk || "-", 
            pasien: isS ? parseInt(pasien) : 0
        });

        localStorage.setItem("cacheData_v2", JSON.stringify(cacheData));
        renderData();

        // --- BAGIAN INI UNTUK MENGOSONGKAN FORM OTOMATIS ---
        document.getElementById('jumlah').value = "";
        document.getElementById('deskripsi').value = "";
        document.getElementById('jumlahPasien').value = "1";
        // Jika ingin tanggal juga ikut ter-reset ke hari ini:
        // document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];
    }

    function renderData() {
        const fU = document.getElementById('filterUsaha').value, fM = document.getElementById('filterMulai').value, fS = document.getElementById('filterSelesai').value;
        const data = cacheData.filter(d => (fU === "Semua" || d.usaha === fU) && (d.tanggal >= fM && d.tanggal <= fS)).sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));
        const tb = document.getElementById('tabelData'); tb.innerHTML = "";
        let k=0, l=0, p=0, g=0;
        data.forEach(d => {
            let gj = (d.jenis === 'masuk' && d.terapis !== "-" && d.terapis !== "Tanpa Nama") ? (d.jumlah <= 50000 ? d.jumlah : d.jumlah * 0.65) : 0;
            if(d.jenis === 'masuk') { k+=d.jumlah; g+=gj; p+=(d.jumlah-gj); } else { l+=d.jumlah; }
            tb.innerHTML += `<tr><td>${formatTglIndo(d.tanggal)}</td><td>${d.usaha}</td><td class="${d.jenis}">${d.jenis.toUpperCase()}</td><td>${d.terapis}</td><td>${formatRupiah(d.jumlah)}</td><td>${d.deskripsi}</td><td><button onclick="hapus(${cacheData.indexOf(d)})" style="color:red;background:none;border:none;cursor:pointer;">&times;</button></td></tr>`;
        });
        document.getElementById('quickKotor').textContent = formatRupiah(k); document.getElementById('quickKeluar').textContent = formatRupiah(l); document.getElementById('quickGaji').textContent = formatRupiah(g); document.getElementById('quickBersih').textContent = formatRupiah(p-l);
    }

    function renderTerapisPage() {
        const terp = document.getElementById('filterKhususTerapis').value;
        const fM = document.getElementById('tglMulaiTerapis').value, fS = document.getElementById('tglSelesaiTerapis').value;
        const data = cacheData.filter(d => d.jenis === 'masuk' && d.terapis !== "-" && (terp === "Semua" || d.terapis === terp) && (d.tanggal >= fM && d.tanggal <= fS)).sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));
        const tb = document.getElementById('tabelTerapis'); tb.innerHTML = "";
        let o=0, g=0, b=0, totalPasien=0;
        data.forEach(d => {
            let gj = (d.jumlah <= 50000) ? d.jumlah : (d.jumlah * 0.65); o+=d.jumlah; g+=gj; b+=(d.jumlah-gj);
totalPasien += d.pasien || ambilJumlahPasien(d.deskripsi) || 1;
            tb.innerHTML += `<tr><td>${formatTglIndo(d.tanggal)}</td><td>${d.usaha}</td><td>${d.terapis}</td><td class="masuk">${formatRupiah(d.jumlah)}</td><td style="color:#FBC02D; font-weight:bold;">${formatRupiah(gj)}</td><td>${d.deskripsi}</td></tr>`;
        });
        document.getElementById('omzetTerapis').textContent = formatRupiah(o); document.getElementById('gajiTerapis').textContent = formatRupiah(g); document.getElementById('bersihTerapisPage').textContent = formatRupiah(b);
        document.getElementById('pasienTerapis').textContent = totalPasien;
    }

    function exportPDFGeneric(mode) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        let title = mode === 'utama' ? "LAPORAN KEUANGAN PETA HASBIYAH" : "LAPORAN BAGI HASIL TERAPIS";
        let fM = mode === 'utama' ? document.getElementById('filterMulai').value : document.getElementById('tglMulaiTerapis').value;
        let fS = mode === 'utama' ? document.getElementById('filterSelesai').value : document.getElementById('tglSelesaiTerapis').value;
        let unit = mode === 'utama' ? document.getElementById('filterUsaha').value : document.getElementById('filterKhususTerapis').value;

        doc.setFillColor(46, 125, 50); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(18); doc.setFont("helvetica", "bold"); doc.text(title, 15, 18);
        doc.setFontSize(10); doc.setFont("helvetica", "normal");
        doc.text(`Periode: ${formatTglIndo(fM)} s/d ${formatTglIndo(fS)}`, 15, 26);
        doc.text(`${mode === 'utama' ? 'Unit Bisnis' : 'Nama Terapis'}: ${unit}`, 15, 32);

        let kotor=0, keluar=0, gaji=0, listTerapisSummary={}, totalPasien=0;
        let filtered = cacheData.filter(d => {
            let dm = d.tanggal >= fM && d.tanggal <= fS;
            if(mode === 'utama') return dm && (unit === "Semua" || d.usaha === unit);
            return dm && d.jenis === 'masuk' && d.terapis !== "-" && (unit === "Semua" || d.terapis === unit);
        }).sort((a,b) => new Date(a.tanggal) - new Date(b.tanggal));

        let rows = filtered.map(d => {
            let gj = 0;
            if(d.jenis === 'masuk') { 
                kotor += d.jumlah; 
                gj = (d.terapis !== "-" && d.terapis !== "Tanpa Nama") ? (d.jumlah <= 50000 ? d.jumlah : d.jumlah * 0.65) : 0; 
                gaji += gj;
                totalPasien += d.pasien || ambilJumlahPasien(d.deskripsi) || 1;
                if(gj > 0) {
                    if(!listTerapisSummary[d.terapis]) listTerapisSummary[d.terapis] = { gaji: 0, pasien: 0 };
                    listTerapisSummary[d.terapis].gaji += gj;
                    listTerapisSummary[d.terapis].pasien += 1;
                }
            } else { keluar += d.jumlah; }
            return mode === 'utama' ? [formatTglIndo(d.tanggal), d.usaha, d.jenis.toUpperCase(), d.terapis, formatRupiah(d.jumlah), d.deskripsi] : [formatTglIndo(d.tanggal), d.usaha, d.terapis, formatRupiah(d.jumlah), formatRupiah(gj), d.deskripsi];
        });

        doc.autoTable({
            head: mode === 'utama' ? [['Tgl', 'Usaha', 'Jenis', 'Terapis', 'Nominal', 'Ket']] : [['Tgl', 'Usaha', 'Nama Terapis', 'Omzet', 'Gaji', 'Ket']],
            body: rows, startY: 45, theme: 'grid', styles: { fontSize: 8, halign: 'center' },
            headStyles: { fillColor: [0, 150, 136], textColor: 255 },
            didParseCell: (data) => {
                if(data.section === 'body') {
                    if(mode === 'terapis') {
                        if(data.column.index === 3) data.cell.styles.textColor = [56, 142, 60];
                        if(data.column.index === 4) { data.cell.styles.textColor = [211, 158, 0]; data.cell.styles.fontStyle = 'bold'; }
                    } else {
                        if(data.cell.raw === 'MASUK') data.cell.styles.textColor = [56, 142, 60];
                        if(data.cell.raw === 'KELUAR') data.cell.styles.textColor = [211, 47, 47];
                    }
                }
            }
        });

        let fy = doc.lastAutoTable.finalY + 10;
        if(fy > 200) { doc.addPage(); fy = 20; }
        
        // BOX RINGKASAN
        let boxHeight = mode === 'terapis' ? 70 : 65;
        doc.setDrawColor(46, 125, 50); doc.rect(15, fy, 180, boxHeight);
        doc.setTextColor(46, 125, 50); doc.setFont("helvetica", "bold"); doc.text("RINGKASAN REKAPITULASI", 20, fy + 8);
        doc.setTextColor(0); doc.setFont("helvetica", "normal");
        
        doc.text(mode === 'utama' ? "Kotor / Omzet" : "Total Omzet Jasa", 20, fy + 18); 
        doc.text(formatRupiah(kotor), 95, fy + 18, {align:'right'});
        
        if(mode === 'terapis') {
            doc.text("Jumlah Pasien", 20, fy + 26);
            doc.text(`${totalPasien} Orang`, 95, fy + 26, {align:'right'});
            doc.text("Total Bagi Hasil (Gaji)", 20, fy + 34);
            doc.setTextColor(211, 158, 0); doc.text(`- ${formatRupiah(gaji)}`, 95, fy + 34, {align:'right'});
        } else {
            doc.text("Pengeluaran Operasional", 20, fy + 26);
            doc.setTextColor(211, 47, 47); doc.text(`- ${formatRupiah(keluar)}`, 95, fy + 26, {align:'right'});
            doc.setTextColor(0);
            doc.text("Total Gaji Terapis", 20, fy + 34);
            doc.setTextColor(211, 158, 0); doc.text(`- ${formatRupiah(gaji)}`, 95, fy + 34, {align:'right'});
        }

        doc.setFillColor(46, 125, 50); doc.rect(15, fy + 48, 180, 12, 'F');
        doc.setTextColor(255); doc.setFont("helvetica", "bold");
        let net = mode === 'utama' ? (kotor - gaji - keluar) : (kotor - gaji);
        doc.text(`TOTAL DANA BERSIH (PETA): ${formatRupiah(net)}`, 105, fy + 55.5, {align:'center'});

        // TAMBAHAN: DISTRIBUSI PER TERAPIS (Hanya di Laporan Terapis)
        if(mode === 'terapis' && Object.keys(listTerapisSummary).length > 0) {
            fy += boxHeight + 10;
            if(fy > 230) { doc.addPage(); fy = 20; }
            doc.setTextColor(46, 125, 50); doc.setFont("helvetica", "bold"); doc.text("DETAIL DISTRIBUSI TERAPIS", 15, fy);
            let summaryData = Object.entries(listTerapisSummary).map(([name, val]) => [name, val.pasien, formatRupiah(val.gaji)]);
            doc.autoTable({
                head: [['Nama Terapis', 'Jml Pasien', 'Total Gaji']],
                body: summaryData, startY: fy + 5, theme: 'striped', styles: { fontSize: 8, halign: 'center' },
                headStyles: { fillColor: [46, 125, 50] }
            });
        }

        doc.save(`${title}.pdf`);
    }

    function exportExcelMain() {
        const ws = XLSX.utils.json_to_sheet(cacheData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, "Rekap_Keuangan_Utama.xlsx");
    }

    function exportExcelTerapis() {
        const fM = document.getElementById('tglMulaiTerapis').value;
        const fS = document.getElementById('tglSelesaiTerapis').value;
        const terp = document.getElementById('filterKhususTerapis').value;
        
        // Filter data khusus terapis sesuai input
        const filtered = cacheData.filter(d => 
            d.jenis === 'masuk' && 
            d.terapis !== "-" && 
            (terp === "Semua" || d.terapis === terp) && 
            (d.tanggal >= fM && d.tanggal <= fS)
        ).map(d => {
            let gj = (d.jumlah <= 50000) ? d.jumlah : (d.jumlah * 0.65);
            return {
                Tanggal: formatTglIndo(d.tanggal),
                Usaha: d.usaha,
                Terapis: d.terapis,
                Omzet: d.jumlah,
                Gaji: gj,
                Net_Peta: d.jumlah - gj,
                Keterangan: d.deskripsi
            };
        });

        // Hitung Summary
        let sumPasien = filtered.length;
        let sumOmzet = filtered.reduce((a, b) => a + b.Omzet, 0);
        let sumGaji = filtered.reduce((a, b) => a + b.Gaji, 0);

        const ws = XLSX.utils.json_to_sheet(filtered);
        
        // Tambahkan baris kosong dan ringkasan di bawah
        XLSX.utils.sheet_add_aoa(ws, [
            [],
            ["RINGKASAN"],
            ["Total Pasien", sumPasien],
            ["Total Omzet", sumOmzet],
            ["Total Gaji", sumGaji],
            ["Total Net Peta", sumOmzet - sumGaji]
        ], { origin: -1 });

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Laporan Terapis");
        XLSX.writeFile(wb, `Laporan_Terapis_${terp}.xlsx`);
    }

    function hapus(i) { if(confirm("Hapus?")) { cacheData.splice(i,1); localStorage.setItem("cacheData_v2", JSON.stringify(cacheData)); renderData(); } }

    renderUsahaUI(); renderTerapisUI(); renderData();
</script>
</body>
</html>
