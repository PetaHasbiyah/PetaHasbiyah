<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Hasbiyah | Dashboard & Pro Export V3.3</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2E7D32; --primary-dark: #1B5E20; --secondary: #E8F5E9;
            --background: #F4F7F6; --text: #333333; --text-light: #757575;
            --white: #FFFFFF; --danger: #D32F2F; --success: #388E3C;
            --shadow: 0 4px 15px rgba(0,0,0,0.05); --transition: all 0.3s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--background); color: var(--text); padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 25px; border-bottom: 1px solid #E0E0E0; margin-bottom: 30px; }
        h1.brand-title { color: var(--primary); font-weight: 700; font-size: 28px; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--white); 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: var(--shadow); 
            border-left: 5px solid transparent; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            cursor: default;
        }
        .stat-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 12px 24px rgba(0,0,0,0.12); }
        .stat-card.stat-kotor { border-left-color: var(--success); }
        .stat-card.stat-keluar { border-left-color: var(--danger); }
        .stat-card.stat-gaji { border-left-color: #FBC02D; }
        .stat-card.stat-bersih { border-left-color: var(--primary); }
        
        .stat-label { font-size: 14px; color: var(--text-light); font-weight: 500; text-transform: uppercase; }
        .stat-value { font-size: 26px; font-weight: 700; margin: 10px 0; }
        .masuk { color: var(--success); }
        .keluar { color: var(--danger); }

        .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 30px; align-items: start; }
        @media (max-width: 1100px) { .main-layout { grid-template-columns: 1fr; } }
        
        .card { background: var(--white); padding: 20px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 20px; }
        h4.card-title { color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid var(--secondary); padding-bottom: 8px;}
        
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #DDD; margin-bottom: 10px; font-family: inherit; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; }
        
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 8px; font-weight: 600; transition: var(--transition); }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-secondary { background: var(--secondary); color: var(--primary); }
        .btn-excel { background: #2E7D32; color: white; }
        .btn-pdf { background: #D32F2F; color: white; }
        .btn-delete { background: #FFEBEE; color: #D32F2F; padding: 4px 8px; font-size: 11px; }

        .manager-list { max-height: 120px; overflow-y: auto; margin-top: 10px; }
        .list-item { display: inline-flex; background: #EEE; padding: 4px 10px; border-radius: 15px; margin: 2px; font-size: 12px; }

        .filter-bar { display: flex; gap: 15px; background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 20px; align-items: flex-end; }
        .table-container { background: white; border-radius: 16px; box-shadow: var(--shadow); padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { padding: 12px; background: #F8F9FA; color: var(--text-light); font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #EEE; }
        td { padding: 12px; border-bottom: 1px solid #F0F0F0; text-align: center; font-size: 14px; }
        .hidden { display: none !important; }
    </style>
</head>

<body>
<div class="container">
    <header>
        <h1 class="brand-title">Peta Hasbiyah 📊</h1>
        <div id="statusMigrasi" style="color: var(--success); font-weight: bold; font-size: 12px;"></div>
    </header>

    <div class="dashboard-grid">
        <div class="stat-card stat-kotor"><div class="stat-label">Total Kotor</div><div id="quickKotor" class="stat-value masuk">Rp 0</div></div>
        <div class="stat-card stat-keluar"><div class="stat-label">Total Keluar</div><div id="quickKeluar" class="stat-value keluar">Rp 0</div></div>
        <div class="stat-card stat-gaji"><div class="stat-label">Gaji Terapis</div><div id="quickGaji" class="stat-value">Rp 0</div></div>
        <div class="stat-card stat-bersih"><div class="stat-label">Bersih Peta</div><div id="quickBersih" class="stat-value" style="color: var(--primary);">Rp 0</div></div>
    </div>

    <div class="main-layout">
        <aside>
            <div class="card">
                <h4 class="card-title">Master Data</h4>
                <div class="flex-row"><input type="text" id="usahaBaru" placeholder="Unit Usaha"><button onclick="tambahUsaha()" class="btn-secondary">Tambah</button></div>
                <div id="daftarUsahaContainer" class="manager-list"></div>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #EEE;">
                <div class="flex-row"><input type="text" id="terapisBaru" placeholder="Nama Terapis"><button onclick="tambahTerapis()" class="btn-secondary">Tambah</button></div>
                <div id="listTerapisContainer" class="manager-list"></div>
            </div>

            <div class="card">
                <h4 class="card-title">Input Transaksi</h4>
                <input type="date" id="tanggal">
                <div class="flex-row">
                    <select id="usaha" onchange="toggleTerapisUI()" style="flex:2"></select>
                    <select id="jenis" style="flex:1"><option value="masuk">Pemasukan</option><option value="keluar">Pengeluaran</option></select>
                </div>
                <select id="inputTerapis" class="hidden"></select>
                <input type="number" id="jumlah" placeholder="Nominal (Rp)">
                <input type="text" id="deskripsi" placeholder="Keterangan">
                <button onclick="tambahData()" class="btn-primary">💾 SIMPAN DATA</button>
            </div>
        </aside>

        <main>
            <div class="filter-bar">
                <div style="flex:1"><label style="font-size:11px; font-weight:bold;">Filter Usaha</label><select id="filterUsaha" onchange="renderData()"></select></div>
                <div style="flex:1"><label style="font-size:11px; font-weight:bold;">Dari</label><input type="date" id="filterMulai" onchange="renderData()"></div>
                <div style="flex:1"><label style="font-size:11px; font-weight:bold;">Sampai</label><input type="date" id="filterSelesai" onchange="renderData()"></div>
                <div style="display:flex; gap:8px;">
                    <button onclick="exportExcel()" class="btn-excel">📗 EXCEL</button>
                    <button onclick="exportPDF()" class="btn-pdf">📕 PDF</button>
                </div>
            </div>
            <div class="table-container">
                <table id="tableUtama"><thead id="headTabel"></thead><tbody id="tabelData"></tbody></table>
            </div>
        </main>
    </div>
</div>

<script>
let cacheData = JSON.parse(localStorage.getItem("cacheData_v2") || "[]");
let daftarUsaha = JSON.parse(localStorage.getItem("daftarUsaha") || '["Pijat","Bekam","Gurah"]');
let daftarTerapis = JSON.parse(localStorage.getItem("daftarTerapis") || '[]');

const formatRupiah = (n) => new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(n||0);
const formatTglIndo = (dateStr) => {
    if(!dateStr) return "-";
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
};

const today = new Date().toISOString().split('T')[0];
document.getElementById('tanggal').value = today;
document.getElementById('filterMulai').value = today.substring(0,8) + '01';
document.getElementById('filterSelesai').value = today;

function renderTerapisUI() {
    const sInput = document.getElementById('inputTerapis');
    const container = document.getElementById('listTerapisContainer');
    sInput.innerHTML = '<option value="">-- Pilih Terapis --</option>';
    container.innerHTML = '';
    daftarTerapis.sort().forEach((t, i) => {
        sInput.innerHTML += `<option value="${t}">${t}</option>`;
        container.innerHTML += `<div class="list-item">${t} <button onclick="hapusMaster('terapis', ${i})" style="color:red; border:none; background:none; cursor:pointer;">&times;</button></div>`;
    });
}
function tambahTerapis() {
    let n = document.getElementById('terapisBaru').value.trim();
    if(!n || daftarTerapis.includes(n)) return;
    daftarTerapis.push(n); localStorage.setItem("daftarTerapis", JSON.stringify(daftarTerapis));
    renderTerapisUI(); document.getElementById('terapisBaru').value = "";
}
function renderUsahaUI() {
    const sUsaha = document.getElementById('usaha'); const fUsaha = document.getElementById('filterUsaha');
    const container = document.getElementById('daftarUsahaContainer');
    sUsaha.innerHTML = ''; fUsaha.innerHTML = '<option value="Semua">Semua Usaha</option>'; container.innerHTML = '';
    daftarUsaha.forEach((u, i) => {
        sUsaha.innerHTML += `<option value="${u}">${u}</option>`; fUsaha.innerHTML += `<option value="${u}">${u}</option>`;
        container.innerHTML += `<div class="list-item">${u} <button onclick="hapusMaster('usaha', ${i})" style="color:red; border:none; background:none; cursor:pointer;">&times;</button></div>`;
    });
    toggleTerapisUI();
}
function tambahUsaha() {
    let u = document.getElementById('usahaBaru').value.trim();
    if(!u || daftarUsaha.includes(u)) return;
    daftarUsaha.push(u); localStorage.setItem("daftarUsaha", JSON.stringify(daftarUsaha));
    renderUsahaUI(); document.getElementById('usahaBaru').value = "";
}
function hapusMaster(type, index) {
    if(!confirm("Hapus?")) return;
    if(type === 'usaha') { daftarUsaha.splice(index, 1); localStorage.setItem("daftarUsaha", JSON.stringify(daftarUsaha)); renderUsahaUI(); }
    else { daftarTerapis.splice(index, 1); localStorage.setItem("daftarTerapis", JSON.stringify(daftarTerapis)); renderTerapisUI(); }
}
function toggleTerapisUI() { const u = document.getElementById('usaha').value.toLowerCase(); document.getElementById('inputTerapis').classList.toggle('hidden', !u.includes("pijat")); }

function tambahData() {
    const u = document.getElementById('usaha').value, tgl = document.getElementById('tanggal').value, jns = document.getElementById('jenis').value, jml = parseInt(document.getElementById('jumlah').value), trp = document.getElementById('inputTerapis').value, dsk = document.getElementById('deskripsi').value;
    if(!tgl || !jml) return alert("Isi nominal!");
    cacheData.push({ tanggal: tgl, usaha: u, jenis: jns, jumlah: jml, terapis: (u.toLowerCase().includes("pijat") ? (trp || "Tanpa Nama") : "-"), deskripsi: dsk || "-" });
    localStorage.setItem("cacheData_v2", JSON.stringify(cacheData));
    document.getElementById('jumlah').value = ""; document.getElementById('deskripsi').value = ""; renderData();
}

function getFilteredData() {
    const fU = document.getElementById('filterUsaha').value, fM = document.getElementById('filterMulai').value, fS = document.getElementById('filterSelesai').value;
    return cacheData.filter(d => (fU === "Semua" || d.usaha === fU) && (d.tanggal >= fM && d.tanggal <= fS));
}

function renderData() {
    const data = getFilteredData(); const table = document.getElementById('tabelData'); const head = document.getElementById('headTabel');
    head.innerHTML = `<tr><th>Tanggal</th><th>Usaha</th><th>Jenis</th><th>Terapis</th><th>Jumlah</th><th>Keterangan</th><th>Aksi</th></tr>`;
    table.innerHTML = "";
    let kotor = 0, keluar = 0, porsiPeta = 0, gaji = {};
    // Tampilan dashboard tetap reverse (terbaru di atas) untuk kemudahan input
    [...data].reverse().forEach((d) => {
        if(d.jenis === 'masuk') {
            kotor += d.jumlah;
            if(d.usaha.toLowerCase().includes("pijat")) {
                let g = (d.jumlah <= 50000) ? d.jumlah : (d.jumlah * 0.65);
                gaji[d.terapis] = (gaji[d.terapis] || 0) + g; porsiPeta += (d.jumlah - g);
            } else { porsiPeta += d.jumlah; }
        } else { keluar += d.jumlah; }
        table.innerHTML += `<tr><td>${formatTglIndo(d.tanggal)}</td><td>${d.usaha}</td><td class="${d.jenis}">${d.jenis.toUpperCase()}</td><td>${d.terapis}</td><td style="font-weight:bold">${formatRupiah(d.jumlah)}</td><td>${d.deskripsi}</td><td><button class="btn-delete" onclick="hapusRawData(${cacheData.indexOf(d)})">Hapus</button></td></tr>`;
    });
    document.getElementById('quickKotor').textContent = formatRupiah(kotor); document.getElementById('quickKeluar').textContent = formatRupiah(keluar);
    document.getElementById('quickGaji').textContent = formatRupiah(Object.values(gaji).reduce((a,b)=>a+b, 0));
    document.getElementById('quickBersih').textContent = formatRupiah(porsiPeta - keluar);
}
function hapusRawData(i) { if(confirm("Hapus?")) { cacheData.splice(i, 1); localStorage.setItem("cacheData_v2", JSON.stringify(cacheData)); renderData(); } }

function exportExcel() {
    // URUTKAN DATA BERDASARKAN TANGGAL (Lama ke Baru)
    const dataFiltered = getFilteredData().sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));
    if (dataFiltered.length === 0) return alert("Data kosong!");
    
    const fMulai = formatTglIndo(document.getElementById('filterMulai').value);
    const fSelesai = formatTglIndo(document.getElementById('filterSelesai').value);
    
    let kotor = 0, keluar = 0, porsiPeta = 0, gaji = {};
    const rows = dataFiltered.map(d => {
        if (d.jenis === 'masuk') {
            kotor += d.jumlah;
            if (d.usaha.toLowerCase().includes("pijat")) {
                let g = (d.jumlah <= 50000) ? d.jumlah : (d.jumlah * 0.65);
                gaji[d.terapis] = (gaji[d.terapis] || 0) + g;
                porsiPeta += (d.jumlah - g);
            } else { porsiPeta += d.jumlah; }
        } else { keluar += d.jumlah; }
        return [formatTglIndo(d.tanggal), d.usaha, d.jenis === 'masuk' ? "[+] MASUK" : "[-] KELUAR", d.terapis, d.jumlah, d.deskripsi];
    });
    const wb = XLSX.utils.book_new();
    const sheetData = [
        ["LAPORAN KEUANGAN PETA HASBIYAH"],
        [`Periode: ${fMulai} s/d ${fSelesai}`],
        [],
        ["TANGGAL", "UNIT USAHA", "JENIS", "TERAPIS", "NOMINAL (RP)", "KETERANGAN"],
        ...rows,
        [],
        ["--- RINGKASAN AKHIR ---"],
        ["TOTAL PENDAPATAN KOTOR", kotor],
        ["TOTAL PENGELUARAN UMUM", keluar],
        ["TOTAL BAGI HASIL (GAJI)", Object.values(gaji).reduce((a, b) => a + b, 0)],
        ["DANA BERSIH PETA", porsiPeta - keluar],
        [],
        ["--- RINCIAN GAJI PER TERAPIS ---"],
        ...Object.entries(gaji).map(([nama, total]) => [nama, total])
    ];
    const ws = XLSX.utils.aoa_to_sheet(sheetData);
    ws['!cols'] = [{wch:15}, {wch:15}, {wch:15}, {wch:20}, {wch:15}, {wch:35}];
    XLSX.utils.book_append_sheet(wb, ws, "Laporan");
    XLSX.writeFile(wb, `Laporan_Peta_${document.getElementById('filterMulai').value}.xlsx`);
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    // URUTKAN DATA BERDASARKAN TANGGAL (Lama ke Baru)
    const dataFiltered = getFilteredData().sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));
    if (dataFiltered.length === 0) return alert("Data kosong!");

    const fMulai = formatTglIndo(document.getElementById('filterMulai').value);
    const fSelesai = formatTglIndo(document.getElementById('filterSelesai').value);

    doc.setFillColor(46, 125, 50);
    doc.rect(0, 0, 210, 35, 'F');
    doc.setFontSize(20); doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "bold");
    doc.text("LAPORAN KEUANGAN", 15, 18);
    doc.setFontSize(10); doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "normal");
    doc.text(`Periode: ${fMulai} s/d ${fSelesai}`, 15, 26);
    
    let kotor = 0, keluar = 0, porsiPeta = 0, gaji = {};
    const tableBody = dataFiltered.map(d => {
        const isMasuk = d.jenis === 'masuk';
        if(isMasuk) {
            kotor += d.jumlah;
            if(d.usaha.toLowerCase().includes("pijat")) {
                let g = (d.jumlah <= 50000) ? d.jumlah : (d.jumlah * 0.65);
                gaji[d.terapis] = (gaji[d.terapis] || 0) + g; porsiPeta += (d.jumlah - g);
            } else { porsiPeta += d.jumlah; }
        } else { keluar += d.jumlah; }
        return [formatTglIndo(d.tanggal), d.usaha, d.jenis.toUpperCase(), d.terapis, formatRupiah(d.jumlah), d.deskripsi, d.jenis];
    });
    doc.autoTable({
        startY: 40,
        head: [['Tgl', 'Usaha', 'Jenis', 'Terapis', 'Nominal', 'Keterangan']],
        body: tableBody.map(row => row.slice(0, 6)),
        theme: 'grid',
        headStyles: { fill: [46, 125, 50], halign: 'center' },
        styles: { fontSize: 8 },
        didParseCell: function(data) {
            const rowIndex = data.row.index;
            const rowData = tableBody[rowIndex];
            if (data.section === 'body') {
                data.cell.styles.fillColor = (rowData[6] === 'masuk') ? [232, 245, 233] : [255, 235, 238];
            }
        },
        columnStyles: { 0: {cellWidth: 22}, 4: { halign: 'right', fontStyle: 'bold', cellWidth: 35 } }
    });
    let finalY = doc.lastAutoTable.finalY + 10;
    if (finalY > 220) { doc.addPage(); finalY = 20; }
    doc.setDrawColor(46, 125, 50);
    doc.setFillColor(252, 255, 252);
    doc.rect(15, finalY, 180, 45 + (Object.keys(gaji).length * 5), 'FD');
    doc.setFontSize(10); doc.setTextColor(46, 125, 50); doc.setFont("helvetica", "bold");
    doc.text("RINGKASAN REKAPITULASI", 20, finalY + 8);
    doc.setFontSize(9); doc.setTextColor(50); doc.setFont("helvetica", "normal");
    doc.text("Total Pendapatan Kotor", 20, finalY + 18); doc.text(formatRupiah(kotor), 90, finalY + 18, {align: 'right'});
    doc.text("Total Pengeluaran Umum", 20, finalY + 24); doc.text(formatRupiah(keluar), 90, finalY + 24, {align: 'right'});
    doc.text("Total Gaji (Bagi Hasil)", 20, finalY + 30); doc.text(formatRupiah(Object.values(gaji).reduce((a,b)=>a+b,0)), 90, finalY + 30, {align: 'right'});
    doc.setDrawColor(230); doc.line(100, finalY + 5, 100, finalY + 40);
    doc.setFont("helvetica", "bold"); doc.text("DETAIL GAJI:", 105, finalY + 18);
    doc.setFont("helvetica", "normal");
    let yGaji = finalY + 24;
    Object.entries(gaji).forEach(([n, t]) => {
        doc.text(`- ${n}`, 105, yGaji); doc.text(formatRupiah(t), 185, yGaji, {align: 'right'});
        yGaji += 5;
    });
    const bersihY = Math.max(yGaji, finalY + 38) + 2;
    doc.setFillColor(46, 125, 50); doc.rect(15, bersihY, 180, 10, 'F');
    doc.setFontSize(11); doc.setTextColor(255); doc.setFont("helvetica", "bold");
    doc.text(`TOTAL DANA BERSIH PETA: ${formatRupiah(porsiPeta - keluar)}`, 105, bersihY + 6.5, {align: 'center'});
    doc.save(`Laporan_Peta_Pro_V3.3.pdf`);
}

renderUsahaUI(); renderTerapisUI(); renderData();
</script>
</body>
</html>
